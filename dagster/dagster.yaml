# dagster/dagster.yaml
# Dagster instance configuration.
# DAGSTER_HOME=/app/dagster (set in Dockerfile) causes Dagster to load this file.
#
# Storage backend: Postgres, 'platform_dagster' database.
# Credentials are injected from environment variables (set via compose env_file).
# The 'platform_dagster' database is created by docker/postgres/init.sql on first boot.

storage:
  postgres:
    postgres_db:
      username:
        env: POSTGRES_USER
      password:
        env: POSTGRES_PASSWORD
      hostname:
        env: POSTGRES_HOST
      db_name:
        env: POSTGRES_DB_DAGSTER
      port: 5432
