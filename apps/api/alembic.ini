# alembic.ini — Alembic configuration for dataplat-api
# S002-F-002: Postgres baseline migration
#
# IMPORTANT: sqlalchemy.url below is a placeholder only.
# It is ALWAYS overridden at runtime by env.py which reads the DATABASE_URL
# environment variable. If env.py fails to fire for any reason, the asyncpg
# driver will give a clear connection error rather than silently connecting
# to a wrong DB.

[alembic]
script_location = alembic

# Placeholder — overridden by env.py via os.environ["DATABASE_URL"]
sqlalchemy.url = postgresql+asyncpg://placeholder/placeholder

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
