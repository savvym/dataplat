# docker/docker-compose.dev.yml
# Dataplat dev stack — 11 services (9 original + minio-init added S003-F-003).
# Usage: docker compose -f docker/docker-compose.dev.yml up -d
#
# Port assignments (HOST:CONTAINER):
#   15432:5432  postgres            (host port 5432 is occupied by another dev stack)
#   16379:6379  redis               (host port 6379 occupied)
#   19000:9000  minio S3 API        (host port 9000 occupied)
#   19001:9001  minio console       (host port 9001 occupied)
#   13000:3000  dagster-webserver   (host port 3000 may be occupied)
#   18000:8000  fastapi             (host port 8000 occupied)
#   15173:80    frontend nginx      (host port 5173 occupied)
#
# Container-internal ports (right side of ":") remain as agreed.md §5 specifies —
# all service-to-service traffic uses container ports unchanged. The +10000 host
# offset was added during S001-F-001 verification because this developer machine
# already runs several stacks on the standard ports.
#
# Worker containers (dagster-worker-cpu, dagster-worker-heavy) run
# `sleep infinity` this sprint — they are structurally present to reserve
# service names but serve no gRPC code location yet.
# Migration to `dagster api grpc` is tracked in the F-005 sprint contract.

name: dataplat

# env_file is loaded for every service that doesn't override it.
# Running with .env.example directly (without copying to .env) gives a
# working dev stack with safe default credentials.

services:

  # ── 1. Postgres ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    env_file: .env.example
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # init.sql runs as superuser on first boot; creates platform_dagster database
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 2. Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 3. MinIO ─────────────────────────────────────────────────────────────
  # Healthcheck uses curl (confirmed at /bin/curl in this image; mc and wget
  # are NOT present in the minio/minio server image — mc lives in minio/mc).
  # /minio/health/live returns 200 when the S3 API is accepting requests.
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    env_file: .env.example
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-devpassword}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_HOST_PORT:-19000}:9000"   # S3-compatible API
      - "${MINIO_CONSOLE_HOST_PORT:-19001}:9001"   # web console (V4)
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # ── 3a. MinIO bucket init ─────────────────────────────────────────────────
  # One-shot service: waits for minio healthy, creates 5 buckets, exits 0.
  # restart: "no" must be quoted — unquoted `no` is boolean false in YAML 1.1.
  # minio/mc tag RELEASE.2025-04-16T18-13-26Z confirmed on Docker Hub
  # (digest sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3).
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    env_file: .env.example
    environment:
      # MC_HOST_<alias> is the mc env-var alias syntax; credentials stay
      # out of command-line arguments. Alias name "init" is local to this
      # container and need not match the alias used in checks.sh V1.
      # NOTE: if MINIO_ROOT_PASSWORD ever contains URL-special chars
      # (@, :, /, ?, #), switch to `mc alias set` with --api S3v4 instead.
      MC_HOST_init: "http://${MINIO_ROOT_USER:-minioadmin}:${MINIO_ROOT_PASSWORD:-devpassword}@minio:9000"
    volumes:
      - ./minio/init-buckets.sh:/init-buckets.sh:ro
    entrypoint: ["/bin/sh", "/init-buckets.sh"]
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  # ── 4. Dagster webserver ──────────────────────────────────────────────────
  # Port :3000 = Dagster webserver (GraphQL API + /dagster_version).
  # NOT the frontend — frontend is on :5173.
  # F-012: bind mount ../dagster:/app/dagster shadows the COPY in the Dockerfile
  # so definitions.py changes take effect on `docker compose restart dagster-webserver`
  # without an image rebuild (local dev — agreed.md §3-U1, §3-D-bindmount-scope).
  # CI/production uses the Dockerfile COPY as usual (no bind mount in those envs).
  dagster-webserver:
    build:
      context: ..
      dockerfile: docker/dagster/Dockerfile
    env_file: .env.example
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB_DAGSTER: ${POSTGRES_DB_DAGSTER:-platform_dagster}
      # F-019: MinIO + platform-DB access for the extract_mineru asset.
      # MINIO_ENDPOINT is not in .env.example; set inline consistent with fastapi service.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
      PLATFORM_DB_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-devpassword}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-platform}
      # F-025: Lance vector table bucket (defaults to "lance", same as apps/api default).
      MINIO_LANCE_BUCKET: ${MINIO_LANCE_BUCKET:-lance}
      # F-028: LLM gateway URL (Dagster calls FastAPI internal endpoint).
      LLM_GATEWAY_URL: ${LLM_GATEWAY_URL:-http://fastapi:8000}
      # F-028: Anthropic API key — absent in CI → mock mode (score=0.5).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # F-028: LLM model name forwarded to gateway. Gateway default is claude-3-haiku-20240307.
      LLM_MODEL: ${LLM_MODEL:-claude-3-haiku-20240307}
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w /app/dagster/workspace.yaml
    volumes:
      - ../dagster:/app/dagster
    ports:
      - "${DAGSTER_HOST_PORT:-13000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:3000/dagster_version', timeout=3).status == 200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # ── 5. Dagster daemon ─────────────────────────────────────────────────────
  # F-012: bind mount for code-location consistency (agreed.md §3-D-bindmount-scope).
  dagster-daemon:
    build:
      context: ..
      dockerfile: docker/dagster/Dockerfile
    env_file: .env.example
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB_DAGSTER: ${POSTGRES_DB_DAGSTER:-platform_dagster}
      # F-019: MinIO + platform-DB access for the extract_mineru asset.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
      PLATFORM_DB_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-devpassword}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-platform}
      # F-025: Lance vector table bucket.
      MINIO_LANCE_BUCKET: ${MINIO_LANCE_BUCKET:-lance}
      # F-028: LLM gateway URL (Dagster calls FastAPI internal endpoint).
      LLM_GATEWAY_URL: ${LLM_GATEWAY_URL:-http://fastapi:8000}
      # F-028: Anthropic API key — absent in CI → mock mode (score=0.5).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # F-028: LLM model name forwarded to gateway. Gateway default is claude-3-haiku-20240307.
      LLM_MODEL: ${LLM_MODEL:-claude-3-haiku-20240307}
    command: dagster-daemon run -w /app/dagster/workspace.yaml
    volumes:
      - ../dagster:/app/dagster
    depends_on:
      postgres:
        condition: service_healthy
      dagster-webserver:
        condition: service_healthy
    restart: unless-stopped

  # ── 6. Dagster worker — CPU ───────────────────────────────────────────────
  # Uses `sleep infinity` this sprint (no real gRPC code location yet).
  # Port 4000 is RESERVED for F-005 (dagster api grpc -p 4000).
  # F-012: bind mount for code-location consistency (agreed.md §3-D-bindmount-scope).
  dagster-worker-cpu:
    build:
      context: ..
      dockerfile: docker/dagster/Dockerfile
    env_file: .env.example
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB_DAGSTER: ${POSTGRES_DB_DAGSTER:-platform_dagster}
      WORKER_PROFILE: cpu
      # F-025: MinIO access needed for chunks asset (read DoclingDocument + write Lance).
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-devpassword}
      MINIO_LANCE_BUCKET: ${MINIO_LANCE_BUCKET:-lance}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
      PLATFORM_DB_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-devpassword}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-platform}
      # F-028: LLM gateway URL (Dagster calls FastAPI internal endpoint).
      LLM_GATEWAY_URL: ${LLM_GATEWAY_URL:-http://fastapi:8000}
      # F-028: Anthropic API key — absent in CI → mock mode (score=0.5).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # F-028: LLM model name forwarded to gateway. Gateway default is claude-3-haiku-20240307.
      LLM_MODEL: ${LLM_MODEL:-claude-3-haiku-20240307}
    command: sleep infinity
    volumes:
      - ../dagster:/app/dagster
    depends_on:
      postgres:
        condition: service_healthy
      dagster-webserver:
        condition: service_healthy
    restart: unless-stopped

  # ── 7. Dagster worker — Heavy ─────────────────────────────────────────────
  # Uses `sleep infinity` this sprint (no real gRPC code location yet).
  # Port 4001 is RESERVED for F-005 (dagster api grpc -p 4001).
  # F-012: bind mount for code-location consistency (agreed.md §3-D-bindmount-scope).
  dagster-worker-heavy:
    build:
      context: ..
      dockerfile: docker/dagster/Dockerfile
    env_file: .env.example
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB_DAGSTER: ${POSTGRES_DB_DAGSTER:-platform_dagster}
      WORKER_PROFILE: heavy
      # F-025: MinIO access needed for chunks asset (read DoclingDocument + write Lance).
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-devpassword}
      MINIO_LANCE_BUCKET: ${MINIO_LANCE_BUCKET:-lance}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
      PLATFORM_DB_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-devpassword}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-platform}
      # F-028: LLM gateway URL (Dagster calls FastAPI internal endpoint).
      LLM_GATEWAY_URL: ${LLM_GATEWAY_URL:-http://fastapi:8000}
      # F-028: Anthropic API key — absent in CI → mock mode (score=0.5).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # F-028: LLM model name forwarded to gateway. Gateway default is claude-3-haiku-20240307.
      LLM_MODEL: ${LLM_MODEL:-claude-3-haiku-20240307}
    command: sleep infinity
    volumes:
      - ../dagster:/app/dagster
    depends_on:
      postgres:
        condition: service_healthy
      dagster-webserver:
        condition: service_healthy
    restart: unless-stopped

  # ── 8. FastAPI ────────────────────────────────────────────────────────────
  # Bind-mounts apps/api/ for live --reload during development.
  # Depends on minio-init completing so all 5 buckets are guaranteed present
  # before any route can run (prevents F-011 race conditions).
  # Depends on dagster-webserver healthy (added S004-F-004) so DagsterGateway
  # can reach the GraphQL endpoint immediately after startup.
  fastapi:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-devpassword}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-platform}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Renamed from DAGSTER_GRAPHQL in S004-F-004; matches Settings.DAGSTER_GRAPHQL_URL
      DAGSTER_GRAPHQL_URL: ${DAGSTER_GRAPHQL_URL:-http://dagster-webserver:3000/graphql}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-devpassword}
      # Added S007-F-007: JWT secret key. No default in Settings — fast fail if absent.
      # The dev placeholder is safe for local development only; set a strong random
      # value (e.g. openssl rand -hex 32) in production.
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
      # F-028: Anthropic SDK credentials for LLM gateway.
      # ANTHROPIC_API_KEY absent/empty → mock mode (score=0.5, model="mock") — no API credits burned.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-3-haiku-20240307}
      # Note: fastapi does NOT need LLM_GATEWAY_URL — it IS the gateway.
    command: uvicorn dataplat_api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      # Bind mount for live reload — the image's COPY is the fallback at build time
      - ../apps/api:/app
    ports:
      - "${FASTAPI_HOST_PORT:-18000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      dagster-webserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).status == 200 else 1)\""]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 9. Frontend ───────────────────────────────────────────────────────────
  # Port :5173 = frontend placeholder (nginx:1.27-alpine serving static HTML).
  # NOT Dagster — Dagster is on :3000.
  # Real frontend (React/Vite) is implemented in F-055.
  frontend:
    build:
      context: ./web
    ports:
      - "${FRONTEND_HOST_PORT:-15173}:80"
    depends_on:
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/ > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  pg_data:
  minio_data:
